version: '3.8'
services:
  db:
    image: postgres
    restart: always
    network_mode: "host"
    environment:
      POSTGRES_PASSWORD: replace_with_postgres_password
    volumes:
      - ./.postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: nervokid/adsbdata:latest
    command: >
      sh -c "python main.py"
    network_mode: "host"
    environment:
      ADSB_DB_PASSWORD: replace_with_adsb_database_password
    depends_on:
      db:
        condition: service_healthy
